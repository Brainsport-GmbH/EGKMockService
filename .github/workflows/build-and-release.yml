name: Build and Release

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # Build job for pull requests (validation only)
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows executable
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: egk-mock-service-windows-pr
          path: dist/EGK Mock Service-win32-x64/**/*
          retention-days: 7

  # Auto-release job for pushes to master
  auto-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: version
        run: |
          npm version patch -m "chore: bump version to %s [skip ci]"
          $VERSION = node -p "require('./package.json').version"
          echo "new_version=v$VERSION" >> $env:GITHUB_OUTPUT
          git push origin master
          git push origin "v$VERSION"
        shell: pwsh

      - name: Install dependencies
        run: npm install

      - name: Build Windows executable
        run: npm run build

      - name: Package executable
        run: |
          cd "dist/EGK Mock Service-win32-x64"
          Compress-Archive -Path * -DestinationPath ../egk-mock-service-${{ steps.version.outputs.new_version }}-win-x64.zip
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          files: dist/egk-mock-service-${{ steps.version.outputs.new_version }}-win-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
